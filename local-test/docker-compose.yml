services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: hello
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: ChangeMe123!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin -d hello"]
      interval: 5s
      retries: 5

  vm:
    image: ubuntu:22.04
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./bootstrap.sh:/bootstrap.sh:ro
      - ./logs:/var/log
    environment:
      SERVICE: vm-demo-dev-weu
      DB_HOST: db
    command: bash /bootstrap.sh
